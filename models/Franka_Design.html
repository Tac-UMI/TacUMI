<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TacUMI Franka Design Preview</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .status {
            position: absolute;
            left: 14px;
            bottom: 12px;
            padding: 8px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            color: #242424;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <canvas id="viewer"></canvas>
    <div class="status" id="status">Loading Franka design...</div>

    <script>
        const files = [
            'Franka_Design_Assembly - Clamp body-2.STL',
            'Franka_Design_Assembly - gear_left_offset0.2-1.STL',
            'Franka_Design_Assembly - gear_right_offset0.2-1.STL',
            'Franka_Design_Assembly - gripper - top_cover-1.STL',
            'Franka_Design_Assembly - handle_design_3-2.STL',
            'Franka_Design_Assembly - handle_lower_new_13.4-1.STL',
            'Franka_Design_Assembly - linkage_left_offset0.2-1.STL',
            'Franka_Design_Assembly - linkage_right_offset0.2-1.STL',
            'Franka_Design_Assembly - Lock Nut-1.STL',
            'Franka_Design_Assembly - Quick-release lever-2.STL',
            'Franka_Design_Assembly - screw-1.STL',
            'Franka_Design_Assembly - SenseOne-1.STL',
            'Franka_Design_Assembly - SenseOne_gripper_mount_back_2-1.STL',
            'Franka_Design_Assembly - SenseOne_gripper_mount_front_design3-1.STL',
            'Franka_Design_Assembly - tactile_holder_left_design3-2.STL',
            'Franka_Design_Assembly - tactile_holder_right_design3-2.STL',
            'Franka_Design_Assembly - tactile_sensor-1.STL',
            'Franka_Design_Assembly - tactile_sensor-2.STL',
            'Franka_Design_Assembly - Vive_Tracker-3.STL'
        ];

        const colors = [
            [0.12, 0.31, 0.47],
            [0.16, 0.16, 0.16],
            [0.50, 0.54, 0.58],
            [0.35, 0.39, 0.48],
            [0.25, 0.45, 0.62],
            [0.20, 0.38, 0.36],
            [0.50, 0.45, 0.32],
            [0.58, 0.58, 0.50],
            [0.42, 0.46, 0.49],
            [0.20, 0.36, 0.40]
        ];

        const canvas = document.getElementById('viewer');
        const statusEl = document.getElementById('status');
        const gl = canvas.getContext('webgl', { antialias: true, preserveDrawingBuffer: true });

        let program;
        let meshes = [];
        let center = [0, 0, 0];
        let scale = 1;
        let yaw = -0.85;
        let pitch = 0.56;
        let distance = 4.2;
        let dragging = false;
        let lastX = 0;
        let lastY = 0;

        if (!gl) {
            statusEl.textContent = 'WebGL is not available in this browser';
        } else {
            start();
        }

        function start() {
            program = createProgram(`
                attribute vec3 aPosition;
                attribute vec3 aNormal;
                uniform mat4 uView;
                uniform mat4 uProjection;
                uniform vec3 uCenter;
                uniform float uScale;
                varying vec3 vNormal;

                void main() {
                    vec3 position = (aPosition - uCenter) * uScale;
                    vNormal = normalize(aNormal);
                    gl_Position = uProjection * uView * vec4(position, 1.0);
                }
            `, `
                precision mediump float;
                varying vec3 vNormal;
                uniform vec3 uColor;

                void main() {
                    vec3 n = normalize(vNormal);
                    vec3 lightA = normalize(vec3(0.45, -0.65, 0.85));
                    vec3 lightB = normalize(vec3(-0.65, 0.35, 0.55));
                    float diffuse = max(dot(n, lightA), 0.0) * 0.68 + max(dot(n, lightB), 0.0) * 0.24;
                    float ambient = 0.34;
                    float edge = pow(1.0 - abs(n.z), 2.0) * 0.10;
                    gl_FragColor = vec4(uColor * (ambient + diffuse) + vec3(edge), 1.0);
                }
            `);

            gl.useProgram(program);
            gl.enable(gl.DEPTH_TEST);
            gl.clearColor(0.956, 0.965, 0.973, 1.0);
            installControls();
            loadMeshes();
            requestAnimationFrame(draw);
        }

        async function loadMeshes() {
            const bounds = {
                min: [Infinity, Infinity, Infinity],
                max: [-Infinity, -Infinity, -Infinity]
            };

            try {
                for (let i = 0; i < files.length; i += 1) {
                    statusEl.textContent = `Loading Franka design... ${i + 1}/${files.length}`;
                    const response = await fetch(encodeURI(`franka_assembly/${files[i]}`));
                    if (!response.ok) throw new Error(`${files[i]} returned ${response.status}`);
                    const parsed = parseBinaryStl(await response.arrayBuffer(), bounds);
                    meshes.push(createMesh(parsed, colors[i % colors.length]));
                }

                center = [
                    (bounds.min[0] + bounds.max[0]) / 2,
                    (bounds.min[1] + bounds.max[1]) / 2,
                    (bounds.min[2] + bounds.max[2]) / 2
                ];
                const size = [
                    bounds.max[0] - bounds.min[0],
                    bounds.max[1] - bounds.min[1],
                    bounds.max[2] - bounds.min[2]
                ];
                scale = 2.8 / Math.max(size[0], size[1], size[2]);
                statusEl.textContent = 'Interactive Franka design preview';
            } catch (error) {
                console.error(error);
                statusEl.textContent = 'Unable to load Franka preview assets';
            }
        }

        function parseBinaryStl(buffer, bounds) {
            const view = new DataView(buffer);
            const triangles = view.getUint32(80, true);
            const positions = new Float32Array(triangles * 9);
            const normals = new Float32Array(triangles * 9);
            let offset = 84;
            let out = 0;

            for (let i = 0; i < triangles; i += 1) {
                const normal = [
                    view.getFloat32(offset, true),
                    view.getFloat32(offset + 4, true),
                    view.getFloat32(offset + 8, true)
                ];
                offset += 12;

                const vertices = [];
                for (let v = 0; v < 3; v += 1) {
                    const vertex = [
                        view.getFloat32(offset, true),
                        view.getFloat32(offset + 4, true),
                        view.getFloat32(offset + 8, true)
                    ];
                    offset += 12;
                    vertices.push(vertex);
                    for (let axis = 0; axis < 3; axis += 1) {
                        bounds.min[axis] = Math.min(bounds.min[axis], vertex[axis]);
                        bounds.max[axis] = Math.max(bounds.max[axis], vertex[axis]);
                    }
                }

                const faceNormal = dot(normal, normal) > 0.000001 ? normalize(normal) : computeNormal(vertices[0], vertices[1], vertices[2]);
                for (let v = 0; v < 3; v += 1) {
                    positions[out] = vertices[v][0];
                    normals[out] = faceNormal[0];
                    positions[out + 1] = vertices[v][1];
                    normals[out + 1] = faceNormal[1];
                    positions[out + 2] = vertices[v][2];
                    normals[out + 2] = faceNormal[2];
                    out += 3;
                }

                offset += 2;
            }

            return { positions, normals, count: triangles * 3 };
        }

        function createMesh(data, color) {
            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, data.positions, gl.STATIC_DRAW);

            const normalBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, normalBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, data.normals, gl.STATIC_DRAW);

            return { positionBuffer, normalBuffer, color, count: data.count };
        }

        function draw() {
            resize();
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            const projection = perspective(42 * Math.PI / 180, canvas.width / canvas.height, 0.01, 100);
            const eye = [
                Math.cos(pitch) * Math.cos(yaw) * distance,
                Math.cos(pitch) * Math.sin(yaw) * distance,
                Math.sin(pitch) * distance
            ];
            const view = lookAt(eye, [0, 0, 0], [0, 0, 1]);

            gl.uniformMatrix4fv(gl.getUniformLocation(program, 'uProjection'), false, projection);
            gl.uniformMatrix4fv(gl.getUniformLocation(program, 'uView'), false, view);
            gl.uniform3fv(gl.getUniformLocation(program, 'uCenter'), center);
            gl.uniform1f(gl.getUniformLocation(program, 'uScale'), scale);

            const positionLoc = gl.getAttribLocation(program, 'aPosition');
            const normalLoc = gl.getAttribLocation(program, 'aNormal');

            for (const mesh of meshes) {
                gl.bindBuffer(gl.ARRAY_BUFFER, mesh.positionBuffer);
                gl.enableVertexAttribArray(positionLoc);
                gl.vertexAttribPointer(positionLoc, 3, gl.FLOAT, false, 0, 0);

                gl.bindBuffer(gl.ARRAY_BUFFER, mesh.normalBuffer);
                gl.enableVertexAttribArray(normalLoc);
                gl.vertexAttribPointer(normalLoc, 3, gl.FLOAT, false, 0, 0);

                gl.uniform3fv(gl.getUniformLocation(program, 'uColor'), mesh.color);
                gl.drawArrays(gl.TRIANGLES, 0, mesh.count);
            }

            requestAnimationFrame(draw);
        }

        function installControls() {
            canvas.addEventListener('pointerdown', event => {
                dragging = true;
                lastX = event.clientX;
                lastY = event.clientY;
                canvas.setPointerCapture(event.pointerId);
            });

            canvas.addEventListener('pointermove', event => {
                if (!dragging) return;
                yaw += (event.clientX - lastX) * 0.008;
                pitch = clamp(pitch + (event.clientY - lastY) * 0.006, -1.25, 1.25);
                lastX = event.clientX;
                lastY = event.clientY;
            });

            canvas.addEventListener('pointerup', () => {
                dragging = false;
            });

            canvas.addEventListener('wheel', event => {
                event.preventDefault();
                distance = clamp(distance * (1 + event.deltaY * 0.001), 1.8, 12);
            }, { passive: false });
        }

        function resize() {
            const ratio = Math.min(window.devicePixelRatio || 1, 2);
            const width = Math.max(1, Math.floor(canvas.clientWidth * ratio));
            const height = Math.max(1, Math.floor(canvas.clientHeight * ratio));
            if (canvas.width !== width || canvas.height !== height) {
                canvas.width = width;
                canvas.height = height;
                gl.viewport(0, 0, width, height);
            }
        }

        function createProgram(vertexSource, fragmentSource) {
            const vertex = createShader(gl.VERTEX_SHADER, vertexSource);
            const fragment = createShader(gl.FRAGMENT_SHADER, fragmentSource);
            const shaderProgram = gl.createProgram();
            gl.attachShader(shaderProgram, vertex);
            gl.attachShader(shaderProgram, fragment);
            gl.linkProgram(shaderProgram);
            if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
                throw new Error(gl.getProgramInfoLog(shaderProgram));
            }
            return shaderProgram;
        }

        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                throw new Error(gl.getShaderInfoLog(shader));
            }
            return shader;
        }

        function perspective(fov, aspect, near, far) {
            const f = 1 / Math.tan(fov / 2);
            const nf = 1 / (near - far);
            return new Float32Array([
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, (far + near) * nf, -1,
                0, 0, 2 * far * near * nf, 0
            ]);
        }

        function lookAt(eye, target, up) {
            const z = normalize(subtract(eye, target));
            const x = normalize(cross(up, z));
            const y = cross(z, x);
            return new Float32Array([
                x[0], y[0], z[0], 0,
                x[1], y[1], z[1], 0,
                x[2], y[2], z[2], 0,
                -dot(x, eye), -dot(y, eye), -dot(z, eye), 1
            ]);
        }

        function computeNormal(a, b, c) {
            return normalize(cross(subtract(b, a), subtract(c, a)));
        }

        function subtract(a, b) {
            return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
        }

        function cross(a, b) {
            return [
                a[1] * b[2] - a[2] * b[1],
                a[2] * b[0] - a[0] * b[2],
                a[0] * b[1] - a[1] * b[0]
            ];
        }

        function dot(a, b) {
            return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
        }

        function normalize(v) {
            const length = Math.hypot(v[0], v[1], v[2]) || 1;
            return [v[0] / length, v[1] / length, v[2] / length];
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }
    </script>
</body>

</html>
